<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изучение греческих слов</title>
    <link rel="stylesheet" href="css/base.css?v=1">
    <link rel="stylesheet" href="css/sidebar.css?v=1">
    <link rel="stylesheet" href="css/search.css?v=3">
    <link rel="stylesheet" href="css/game.css?v=24">
    <link rel="stylesheet" href="css/responsive.css?v=2">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <!-- Sidebar Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Sidebar Overlay (for mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-mode-toggle">
            <button id="modeLessons">Поиск</button>
            <button id="modeSelfCheck">Повторение</button>
        </div>
        <nav class="lesson-menu" id="lessonMenu">
            <!-- Lessons will be rendered here -->
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content expanded" id="mainContent">
        <div class="container">
            <h1>Изучение греческих слов</h1>

            <div id="lessonsView">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Поиск на греческом или русском...">
                </div>
                <div class="words-container" id="wordsContainer">
                    <!-- Words will be rendered here -->
                </div>
            </div>

            <div id="selfCheckView" class="hidden">
                <div class="game-settings">
                    <div class="setting-group">
                        <div class="game-mode-selector">
                            <button class="game-mode-button active" data-mode="audio">Аудирование</button>
                            <button class="game-mode-button" data-mode="ru-gr">Русский → Греческий</button>
                            <button class="game-mode-button" data-mode="gr-ru">Греческий → Русский</button>
                        </div>
                    </div>
                    <div class="setting-group">
                        <div id="lessonFilterContainer" class="custom-select-wrapper">
                            <button id="lessonFilterButton" class="custom-select-button">
                                <span id="lessonFilterValue" class="custom-select-value">Все уроки</span>
                                <span class="custom-select-arrow">▼</span>
                            </button>
                            <div id="lessonFilterDropdown" class="custom-select-dropdown hidden">
                                <!-- Options populated by JS -->
                            </div>
                        </div>
                        <button id="settingsBtn" class="settings-btn" aria-label="Настройки">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path
                                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="fc-progress" id="fcProgress">
                    <div class="fc-progress-header">
                        <div class="fc-progress-text" id="fcProgressText">Выучено: 0 / 0</div>
                        <button id="undoBtn" class="undo-btn hidden" title="Отменить последнее действие">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M3 7v6h6"></path>
                                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="fc-progress-bar">
                        <div class="fc-progress-fill-blue" id="fcProgressFillBlue" style="width: 0%"></div>
                        <div class="fc-progress-fill" id="fcProgressFill" style="width: 0%"></div>
                    </div>
                </div>

                <div class="game-scene" id="gameScene">
                    <div id="mixedBadge" class="mixed-badge hidden">★ Из других уроков</div>
                    <div class="game-card" id="gameCard">
                        <div class="card-face card-face-front">
                            <div class="swipe-indicator indicator-remember">Помню</div>
                            <div class="swipe-indicator indicator-forget">Не помню</div>

                            <span class="speaker-icon" id="playAudioIcon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
                                    <path
                                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z">
                                    </path>
                                </svg>
                            </span>
                            <div class="card-badges">
                                <span id="examBadgeFront" class="badge-icon hidden" title="Слово из экзамена">🎓</span>
                                <span id="group1BadgeFront" class="badge-icon hidden" title="Очень частое слово">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28"
                                        style="vertical-align: middle;">
                                        <path d="M7.5 13.5 L4.5 22.5 L12 19.5 L19.5 22.5 L16.5 13.5 Z" fill="#E74C3C"
                                            stroke="#C0392B" stroke-width="0.8" stroke-linejoin="round" />
                                        <circle cx="12" cy="8.5" r="7.5" fill="#F1C40F" stroke="#D68910"
                                            stroke-width="1" />
                                        <circle cx="12" cy="8.5" r="5.5" fill="none" stroke="#D68910" stroke-width="0.5"
                                            stroke-dasharray="1 1" />
                                        <text x="12" y="11.5"
                                            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
                                            font-size="9.5" font-weight="900" fill="#7E5109"
                                            text-anchor="middle">1</text>
                                    </svg>
                                </span>
                                <span id="group2BadgeFront" class="badge-icon hidden" title="Частое слово">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28"
                                        style="vertical-align: middle;">
                                        <path d="M7.5 13.5 L4.5 22.5 L12 19.5 L19.5 22.5 L16.5 13.5 Z" fill="#E74C3C"
                                            stroke="#C0392B" stroke-width="0.8" stroke-linejoin="round" />
                                        <circle cx="12" cy="8.5" r="7.5" fill="#ECF0F1" stroke="#BDC3C7"
                                            stroke-width="1" />
                                        <circle cx="12" cy="8.5" r="5.5" fill="none" stroke="#BDC3C7" stroke-width="0.5"
                                            stroke-dasharray="1 1" />
                                        <text x="12" y="11.5"
                                            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
                                            font-size="9.5" font-weight="900" fill="#2C3E50"
                                            text-anchor="middle">2</text>
                                    </svg>
                                </span>
                                <span id="group3BadgeFront" class="badge-icon hidden" title="Редкое слово">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28"
                                        style="vertical-align: middle;">
                                        <path d="M7.5 13.5 L4.5 22.5 L12 19.5 L19.5 22.5 L16.5 13.5 Z" fill="#E74C3C"
                                            stroke="#C0392B" stroke-width="0.8" stroke-linejoin="round" />
                                        <circle cx="12" cy="8.5" r="7.5" fill="#E59866" stroke="#BA4A00"
                                            stroke-width="1" />
                                        <circle cx="12" cy="8.5" r="5.5" fill="none" stroke="#BA4A00" stroke-width="0.5"
                                            stroke-dasharray="1 1" />
                                        <text x="12" y="11.5"
                                            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
                                            font-size="9.5" font-weight="900" fill="#4A2305"
                                            text-anchor="middle">3</text>
                                    </svg>
                                </span>
                            </div>
                            <div class="game-word-front" id="gameWordFront"></div>
                            <div class="card-example card-example-front" id="cardExampleFront"></div>
                        </div>
                        <div class="card-face card-face-back">
                            <div class="swipe-indicator indicator-remember">Помню</div>
                            <div class="swipe-indicator indicator-forget">Не помню</div>

                            <span class="speaker-icon hidden" id="playAudioIconBack">
                                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24">
                                    <path
                                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z">
                                    </path>
                                </svg>
                            </span>

                            <div class="game-word" id="gameWord"></div>
                            <div class="game-translation" id="gameTranslation"></div>
                            <div class="card-example card-example-back" id="cardExampleBack"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-complete hidden" id="fcComplete">
                    <div class="fc-complete-text">Все слова пройдены!</div>
                    <button class="fc-reset-btn" id="fcResetBtn">Сбросить прогресс</button>
                </div>

                <div class="swipe-hint-text" id="swipeHint">
                    <button id="btnForget" class="hint-pill hint-pill-red">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 6px;">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        Не помню
                    </button>
                    <button id="btnRemember" class="hint-pill hint-pill-green">
                        Помню
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 6px;">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>

                <div id="settingsModal" class="settings-modal hidden">
                    <div class="settings-modal-content">
                        <div class="settings-modal-header">
                            <h2>Настройки</h2>
                            <button id="closeSettingsBtn" class="settings-modal-close">&times;</button>
                        </div>
                        <div class="settings-modal-body">
                            <div class="setting-group">
                                <div class="autoplay-setting">
                                    <input type="checkbox" id="shuffleWords">
                                    <label for="shuffleWords">Перемешивать слова</label>
                                </div>
                            </div>
                            <div class="setting-group" id="mixSetting">
                                <div class="autoplay-setting">
                                    <input type="checkbox" id="mixWords" checked>
                                    <label for="mixWords">Подмешивать слова</label>
                                </div>
                            </div>
                            <div class="setting-group">
                                <div class="autoplay-setting">
                                    <input type="checkbox" id="autoplayAudio" checked>
                                    <label for="autoplayAudio">Автовоспроизведение</label>
                                </div>
                            </div>
                            <div class="settings-actions">
                                <button id="settingsResetCurrentBtn"
                                    class="settings-action-btn btn-warning">Перезапустить текущий набор</button>
                                <button id="settingsResetAllBtn" class="settings-action-btn btn-danger">Сбросить весь
                                    прогресс</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/words/lessons.js?v=26"></script>
    <script src="js/speech.js?v=2"></script>
    <script src="js/sidebar.js?v=1"></script>
    <script src="js/search.js?v=4"></script>
    <script src="js/game.js?v=22"></script>
    <script src="js/app.js?v=4"></script>
</body>

</html>
